name: tron-monorepo-sync-and-ci

on:
  workflow_dispatch:
    inputs:
      libp2p_ref:
        description: "Branch or tag for tronprotocol/libp2p"
        required: false
        default: "main"
      java_tron_ref:
        description: "Branch or tag for tronprotocol/java-tron"
        required: false
        default: "develop"
  schedule:
    - cron: "0 3 * * 1"
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tron-monorepo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-upstreams:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.REPO_PAT }}

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify token
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "REPO_PAT is missing or empty"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remotes
        run: |
          git remote add libp2p-upstream https://github.com/tronprotocol/libp2p.git 2>/dev/null || true
          git remote add java-tron-upstream https://github.com/tronprotocol/java-tron.git 2>/dev/null || true
          git fetch --prune libp2p-upstream
          git fetch --prune java-tron-upstream

      - name: Import libp2p into vendor/libp2p
        env:
          LIBP2P_REF: ${{ inputs.libp2p_ref || 'main' }}
        run: |
          mkdir -p vendor
          if [ -d vendor/libp2p ]; then
            git subtree pull --prefix=vendor/libp2p libp2p-upstream "$LIBP2P_REF" --squash
          else
            git subtree add --prefix=vendor/libp2p libp2p-upstream "$LIBP2P_REF" --squash
          fi

      - name: Import java-tron into vendor/java-tron
        env:
          JAVA_TRON_REF: ${{ inputs.java_tron_ref || 'develop' }}
        run: |
          mkdir -p vendor
          if [ -d vendor/java-tron ]; then
            git subtree pull --prefix=vendor/java-tron java-tron-upstream "$JAVA_TRON_REF" --squash
          else
            git subtree add --prefix=vendor/java-tron java-tron-upstream "$JAVA_TRON_REF" --squash
          fi

      - name: Commit changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git checkout -b sync/tron-monorepo
          git add vendor/libp2p vendor/java-tron
          git commit -m "sync: import tronprotocol/libp2p and tronprotocol/java-tron"

      - name: Push branch
        run: |
          git push --force-with-lease origin sync/tron-monorepo

      - name: Create pull request
        run: |
          gh pr create \
            --base main \
            --head sync/tron-monorepo \
            --title "Sync tronprotocol repos into monorepo" \
            --body $'Imports:\n- tronprotocol/libp2p -> vendor/libp2p\n- tronprotocol/java-tron -> vendor/java-tron' \
            --label automation \
            --label monorepo || true

  build-libp2p:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build libp2p
        working-directory: vendor/libp2p
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean build -x test

  build-java-tron:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build java-tron
        working-directory: vendor/java-tron
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean build -x test
