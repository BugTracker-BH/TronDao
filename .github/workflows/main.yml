- name: Setup Java 17 for libp2p
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: '17'

- name: Build libp2p
  working-directory: vendor/libp2p
  run: |
    chmod +x gradlew
    ./gradlew clean build -x test

- name: Setup Java 8 for java-tron
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: '8'

- name: Verify Java
  run: |
    java -version
    echo $JAVA_HOME

- name: Build java-tron
  working-directory: vendor/java-tron
  run: |
    chmod +x gradlew
    ./gradlew clean build -x test
