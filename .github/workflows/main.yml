name: tron-monorepo-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.TEST }}

    steps:
      - name: Verify Secret
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "TEST secret missing"
            exit 1
          fi
          echo "TEST secret found"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TEST }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Repositories
        run: |
          git remote add libp2p https://github.com/tronprotocol/libp2p.git || true
          git remote add java-tron https://github.com/tronprotocol/java-tron.git || true

          git fetch libp2p
          git fetch java-tron

      - name: Sync libp2p
        run: |
          mkdir -p vendor

          if [ -d vendor/libp2p ]; then
            git subtree pull \
              --prefix=vendor/libp2p \
              libp2p \
              main \
              --squash
          else
            git subtree add \
              --prefix=vendor/libp2p \
              libp2p \
              main \
              --squash
          fi

      - name: Sync java-tron
        run: |
          mkdir -p vendor

          if [ -d vendor/java-tron ]; then
            git subtree pull \
              --prefix=vendor/java-tron \
              java-tron \
              develop \
              --squash
          else
            git subtree add \
              --prefix=vendor/java-tron \
              java-tron \
              develop \
              --squash
          fi

      - name: Commit Changes
        run: |
          git checkout -B sync/tron-monorepo

          git add vendor/

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "sync: tronprotocol repositories"

      - name: Push Branch
        run: |
          git push \
            https://x-access-token:${{ secrets.TEST }}@github.com/${{ github.repository }}.git \
            sync/tron-monorepo \
            --force

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.TEST }}
        run: |
          gh pr create \
            --base main \
            --head sync/tron-monorepo \
            --title "Sync tronprotocol repos" \
            --body "Automated sync of libp2p and java-tron" \
            || echo "PR already exists"
